# Perspective groups — canonical mapping of group slugs to perspective lists.
#
# Copy this file as _groups.yaml and uncomment/customize the groups that
# match your project. Technology choices imply expertise needs: if your
# project has a UI, you need a UI committee. If it has an API, you need
# a system health committee.
#
# Consumed by:
#   - /audit skill (group selection menu)
#   - scripts (--group flag, resolve-groups helpers)
#
# Cross-cutting perspectives are NOT in any group. They activate via
# always-on-for signals in their SKILL.md frontmatter:
#   anti-confirmation, qa, debugger, organized-mind

groups:
